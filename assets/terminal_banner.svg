<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 340" width="100%" height="340">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141923" />
      <stop offset="100%" stop-color="#0e121a" />
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" />
      <stop offset="50%" stop-color="#8a2be2" />
      <stop offset="100%" stop-color="#39ff14" />
    </linearGradient>
    
    <!-- Pulse Effect for Uptime Ring -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;family=Outfit:wght@400;600;800&amp;display=swap');
      
      .terminal-text {
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
        font-size: 13px;
        fill: #c9d1d9;
      }
      .panel-header-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        fill: #8b949e;
        letter-spacing: 1px;
      }
      .metric-label {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 12px;
        fill: #8b949e;
        font-weight: 400;
      }
      .metric-value {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 18px;
        font-weight: 800;
        fill: #ffffff;
      }

      /* CLI Output Typing Animation Timeline (Total Loop: 24 seconds) */
      .prompt { fill: #58a6ff; font-weight: bold; }
      .cmd { fill: #00f5ff; font-weight: 500; }
      .ok { fill: #39ff14; font-weight: bold; }
      .info { fill: #8a2be2; font-weight: bold; }
      .warn { fill: #ffaa00; font-weight: bold; }
      .alert { fill: #ff3366; font-weight: bold; filter: drop-shadow(0 0 2px #ff3366); }

      /* Animation keyframes for CLI logs */
      @keyframes lineFade {
        0%, 100% { opacity: 0; transform: translateY(5px); }
        /* Line 1 types at 0.5s */
        1.5%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade2 {
        0%, 7.5%, 100% { opacity: 0; transform: translateY(5px); }
        9%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade3 {
        0%, 14.5%, 100% { opacity: 0; transform: translateY(5px); }
        16%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade4 {
        0%, 22.5%, 100% { opacity: 0; transform: translateY(5px); }
        24%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade5 {
        0%, 30.5%, 100% { opacity: 0; transform: translateY(5px); }
        32%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade6 {
        0%, 39.5%, 100% { opacity: 0; transform: translateY(5px); }
        41%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade7 {
        0%, 48.5%, 100% { opacity: 0; transform: translateY(5px); }
        50%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade8 {
        0%, 60.5%, 100% { opacity: 0; transform: translateY(5px); }
        62%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade9 {
        0%, 72.5%, 100% { opacity: 0; transform: translateY(5px); }
        74%, 98% { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineFade10 {
        0%, 82.5%, 100% { opacity: 0; transform: translateY(5px); }
        84%, 98% { opacity: 1; transform: translateY(0); }
      }

      .log-1 { animation: lineFade 24s infinite; }
      .log-2 { animation: lineFade2 24s infinite; }
      .log-3 { animation: lineFade3 24s infinite; }
      .log-4 { animation: lineFade4 24s infinite; }
      .log-5 { animation: lineFade5 24s infinite; }
      .log-6 { animation: lineFade6 24s infinite; }
      .log-7 { animation: lineFade7 24s infinite; }
      .log-8 { animation: lineFade8 24s infinite; }
      .log-9 { animation: lineFade9 24s infinite; }
      .log-10 { animation: lineFade10 24s infinite; }

      /* Blinking terminal cursor */
      @keyframes blink {
        0%, 49%, 100% { opacity: 0; }
        50%, 99% { opacity: 1; }
      }
      .cursor {
        animation: blink 1s infinite;
        fill: #00f5ff;
      }

      /* Live Observability Panel Animations */
      @keyframes radialDraw {
        0%, 100% { stroke-dashoffset: 220; }
        10%, 90% { stroke-dashoffset: 0.2; }
      }
      .uptime-ring {
        stroke-dasharray: 220;
        stroke-dashoffset: 220;
        transform: rotate(-90deg);
        transform-origin: 675px 115px;
        animation: radialDraw 24s infinite ease-in-out;
      }

      /* Server Nodes Matrix Pulse & Error Simulation */
      @keyframes nodePulseGreen {
        0%, 100% { fill: #39ff14; fill-opacity: 0.7; }
        50% { fill: #39ff14; fill-opacity: 1; filter: drop-shadow(0 0 2px #39ff14); }
      }
      @keyframes nodeFailing {
        0%, 48.4%, 72.6%, 100% { fill: #39ff14; fill-opacity: 0.7; }
        48.5%, 72.5% { fill: #ff3366; fill-opacity: 1; filter: drop-shadow(0 0 4px #ff3366); }
      }

      .node-ok { animation: nodePulseGreen 3s infinite ease-in-out; }
      .node-ok-slow { animation: nodePulseGreen 4s infinite ease-in-out; }
      /* Simulated server incident that triggers at 48.5% (approx 11.6s) and heals at 72.5% (approx 17.4s) */
      .node-target { animation: nodeFailing 24s infinite linear; }

      /* Dashboard bar progress */
      @keyframes barGrow {
        0%, 100% { width: 0px; }
        20%, 90% { width: 140px; }
      }
      .bar-fill {
        animation: barGrow 24s infinite ease-in-out;
      }

    </style>
  </defs>

  <!-- 1. Window Frame -->
  <rect x="2" y="2" width="846" height="336" rx="10" fill="url(#bgGrad)" stroke="#1a2130" stroke-width="1.5" />

  <!-- 2. Window Header Bar -->
  <rect x="2" y="2" width="846" height="36" rx="10" fill="url(#headerGrad)" stroke="#1a2130" stroke-width="0.75" />
  <circle cx="18" cy="20" r="5.5" fill="#ff5f56" />
  <circle cx="34" cy="20" r="5.5" fill="#ffbd2e" />
  <circle cx="50" cy="20" r="5.5" fill="#27c93f" />

  <!-- Terminal Label -->
  <text x="425" y="24" font-family="'Outfit', sans-serif" font-weight="600" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="1.5px">
    PAWANGOND // SRE OPERATIONAL DECK
  </text>

  <!-- Connection Status Node -->
  <circle cx="815" cy="20" r="4" fill="#39ff14" filter="url(#glow)" />
  <text x="804" y="23" font-family="'Fira Code', monospace" font-size="9" fill="#39ff14" text-anchor="end">NODE_ACTIVE</text>

  <!-- Vertical Divider Panel -->
  <line x1="560" y1="38" x2="560" y2="338" stroke="#161b22" stroke-width="1.5" />

  <!-- ================= LEFT PANEL: TERMINAL CONSOLE ================= -->
  <svg x="10" y="38" width="540" height="300">
    <!-- Grid scan lines overlay -->
    <path d="M 0,10 L 540,10 M 0,20 L 540,20 M 0,30 L 540,30 M 0,40 L 540,40 M 0,50 L 540,50 M 0,60 L 540,60 M 0,70 L 540,70 M 0,80 L 540,80 M 0,90 L 540,90 M 0,100 L 540,100 M 0,110 L 540,110 M 0,120 L 540,120 M 0,130 L 540,130 M 0,140 L 540,140 M 0,150 L 540,150 M 0,160 L 540,160 M 0,170 L 540,170 M 0,180 L 540,180 M 0,190 L 540,190 M 0,200 L 540,200 M 0,210 L 540,210 M 0,220 L 540,220 M 0,230 L 540,230 M 0,240 L 540,240 M 0,250 L 540,250 M 0,260 L 540,260 M 0,270 L 540,270 M 0,280 L 540,280" 
          stroke="#161b22" stroke-width="0.5" opacity="0.4" />

    <!-- CLI Commands Group -->
    <g class="terminal-text" transform="translate(15, 25)">
      <!-- Line 1 -->
      <g class="log-1">
        <text x="0" y="0"><tspan class="prompt">pawangond@ops-control:~$</tspan> <tspan class="cmd">init_reliability_system.sh --live</tspan></text>
      </g>
      
      <!-- Line 2 -->
      <g class="log-2">
        <text x="0" y="20"><tspan class="info">[INFO]</tspan> Initializing self-healing observability loops...</text>
      </g>

      <!-- Line 3 -->
      <g class="log-3">
        <text x="0" y="40"><tspan class="info">[INFO]</tspan> Establishing telemetry endpoints to PubMatic Node cluster...</text>
      </g>

      <!-- Line 4 -->
      <g class="log-4">
        <text x="0" y="60"><tspan class="ok">[OK]</tspan> Connected to <tspan fill="#ffffff" font-weight="bold">15,000+ bare-metal &amp; cloud servers</tspan> (PubMatic Production).</text>
      </g>

      <!-- Line 5 -->
      <g class="log-5">
        <text x="0" y="80"><tspan class="info">[INFO]</tspan> Activating proactive AI Incident Responder (Qdrant Vector DB &amp; RAG)...</text>
      </g>

      <!-- Line 6 -->
      <g class="log-6">
        <text x="0" y="100"><tspan class="ok">[OK]</tspan> RAG pipeline active. MTTR minimized dynamically by 30%.</text>
      </g>

      <!-- Line 7 -->
      <g class="log-7">
        <text x="0" y="120"><tspan class="alert">[ALERT] Severe-1 Incident: Latency anomaly detected on ap-southeast-1!</tspan></text>
      </g>

      <!-- Line 8 -->
      <g class="log-8">
        <text x="0" y="140"><tspan class="info">[HEAL]</tspan> AI-Responder dispatched resolution. Running self-heal hook via AWS Lambda...</text>
      </g>

      <!-- Line 9 -->
      <g class="log-9">
        <text x="0" y="160"><tspan class="ok">[HEAL] Hot-patch applied. Latency returned to 14ms. Incident RESOLVED.</tspan></text>
      </g>

      <!-- Line 10 -->
      <g class="log-10">
        <text x="0" y="180"><tspan class="ok">[SUCCESS]</tspan> Global state healthy. System Uptime: <tspan fill="#ffffff" font-weight="bold">99.99%</tspan> | SLA: <tspan fill="#ffffff" font-weight="bold">99% compliant</tspan>.</text>
        <text x="0" y="200"><tspan class="prompt">pawangond@ops-control:~$</tspan> <tspan class="cmd">sys_status --active</tspan><tspan class="cursor">_</tspan></text>
      </g>
    </g>
  </svg>

  <!-- ================= RIGHT PANEL: OBSERVABILITY DASHBOARD ================= -->
  <svg x="560" y="38" width="290" height="300">
    <!-- Header -->
    <text x="20" y="30" class="panel-header-text">SYSTEM HEALTH CONSOLE</text>
    <line x1="20" y1="36" x2="250" y2="36" stroke="#1f242c" stroke-width="1" />

    <!-- 1. Circular Uptime Gauge -->
    <g transform="translate(0, 0)">
      <!-- Gray background circle -->
      <circle cx="65" cy="95" r="35" fill="none" stroke="#161b22" stroke-width="6" />
      <!-- Animated primary uptime circle -->
      <circle cx="65" cy="95" r="35" fill="none" stroke="#39ff14" stroke-width="6" 
              class="uptime-ring" filter="url(#glow)" stroke-linecap="round" />
      
      <!-- Inside circle metric -->
      <text x="65" y="99" font-family="'Outfit', sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">99.99%</text>
      
      <!-- Label Details -->
      <text x="120" y="85" class="metric-label">UPTIME COMPLIANCE</text>
      <text x="120" y="105" font-family="'Outfit', sans-serif" font-weight="700" font-size="16" fill="#39ff14" filter="url(#glow)">STABLE</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="155" x2="250" y2="155" stroke="#1f242c" stroke-width="1" />

    <!-- 2. Automated SRE Server Cluster (Interactive Green Grid with 1 Anomaly Node) -->
    <text x="20" y="180" class="panel-header-text">ACTIVE SERVERS MATRIX (15K+ TOTAL)</text>
    <g transform="translate(20, 195)">
      <!-- Draw grid nodes (9 nodes for demonstration) -->
      <!-- Row 1 -->
      <rect x="0" y="0" width="16" height="16" rx="3" class="node-ok" fill="#39ff14" />
      <rect x="22" y="0" width="16" height="16" rx="3" class="node-ok-slow" fill="#39ff14" />
      <rect x="44" y="0" width="16" height="16" rx="3" class="node-ok" fill="#39ff14" />
      <rect x="66" y="0" width="16" height="16" rx="3" class="node-ok" fill="#39ff14" />
      <rect x="88" y="0" width="16" height="16" rx="3" class="node-ok-slow" fill="#39ff14" />
      
      <!-- Row 2 -->
      <rect x="0" y="22" width="16" height="16" rx="3" class="node-ok-slow" fill="#39ff14" />
      <rect x="22" y="22" width="16" height="16" rx="3" class="node-target" fill="#39ff14" /> <!-- Simulated unstable node -->
      <rect x="44" y="22" width="16" height="16" rx="3" class="node-ok" fill="#39ff14" />
      <rect x="66" y="22" width="16" height="16" rx="3" class="node-ok-slow" fill="#39ff14" />
      <rect x="88" y="22" width="16" height="16" rx="3" class="node-ok" fill="#39ff14" />

      <!-- Server Stack Metadata labels -->
      <g transform="translate(120, 15)">
        <text x="0" y="0" class="metric-label" font-size="10">INFRA SCALE:</text>
        <text x="0" y="16" class="metric-value" font-size="13" fill="#ffffff" font-family="'Fira Code', monospace">15,000+ HOSTS</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="20" y1="250" x2="250" y2="250" stroke="#1f242c" stroke-width="1" />

    <!-- 3. Cost-Optimization indicator -->
    <g transform="translate(20, 260)">
      <text x="0" y="12" class="metric-label" font-size="11">CLOUD COST EFFICIENCY</text>
      <!-- Horizontal progress track -->
      <rect x="0" y="20" width="160" height="8" rx="4" fill="#161b22" />
      <!-- Animated horizontal fill -->
      <rect x="0" y="20" width="112" height="8" rx="4" fill="url(#neonGlow)" class="bar-fill" />
      
      <!-- Percentage display -->
      <text x="170" y="28" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#00f5ff" filter="url(#glow)">70%</text>
    </g>

  </svg>
</svg>
