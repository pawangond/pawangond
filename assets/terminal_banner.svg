<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 180" width="100%" height="180">
  <defs>
    <!-- Obsidian & Neon Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06090e" />
      <stop offset="50%" stop-color="#0b101d" />
      <stop offset="100%" stop-color="#040508" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121826" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0c101c" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" />
      <stop offset="50%" stop-color="#8a2be2" />
      <stop offset="100%" stop-color="#39ff14" />
    </linearGradient>

    <!-- Filters for High-End Glowing Accents -->
    <filter id="cyanGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- CDATA wrapped stylesheet to prevent XML parsing issues -->
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@400;600;800&display=swap');
      
      .hud-text {
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
        font-size: 11px;
        fill: #8d9eb5;
      }
      .panel-header-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 10px;
        font-weight: 800;
        fill: #00f5ff;
        letter-spacing: 2px;
        filter: drop-shadow(0 0 1px rgba(0, 245, 255, 0.4));
      }
      .metric-label {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 10px;
        fill: #626c85;
        font-weight: 600;
        letter-spacing: 1px;
      }
      .metric-value {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 16px;
        font-weight: 800;
        fill: #ffffff;
      }

      /* Animated heartbeat telemetry wave (CPU Oscilloscope) */
      @keyframes heartbeat {
        0% { stroke-dashoffset: 400; }
        100% { stroke-dashoffset: 0; }
      }
      .heartbeat-line {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: heartbeat 5s infinite linear;
        transition: stroke 0.3s, filter 0.3s, stroke-width 0.3s;
      }
      .heartbeat-line:hover {
        stroke: #39ff14 !important;
        filter: url(#greenGlow) !important;
        stroke-width: 2.25px !important;
        cursor: pointer;
      }

      /* Uptime Ring Loading Animation */
      @keyframes arcDraw {
        0% { stroke-dashoffset: 220; }
        100% { stroke-dashoffset: 15; }
      }
      .gauge-ring {
        stroke-dasharray: 220;
        stroke-dashoffset: 15;
        transform: rotate(-90deg);
        transform-origin: 100px 90px;
        animation: arcDraw 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        transition: stroke 0.4s, filter 0.4s;
      }

      /* Server cluster pulse */
      @keyframes serverGreen {
        0%, 100% { fill: #39ff14; fill-opacity: 0.6; }
        50% { fill: #39ff14; fill-opacity: 1; }
      }
      .node-ok { animation: serverGreen 3s infinite ease-in-out; transition: fill 0.2s, fill-opacity 0.2s; }
      .node-ok-slow { animation: serverGreen 4.5s infinite ease-in-out; transition: fill 0.2s, fill-opacity 0.2s; }

      /* Interactivity on hover */
      .uptime-group { cursor: pointer; }
      .uptime-group:hover .gauge-ring {
        stroke: #8a2be2 !important;
        filter: url(#cyanGlow) !important;
      }
      .uptime-group:hover .gauge-val {
        fill: #00f5ff !important;
      }

      .server-node { cursor: crosshair; }
      .server-node:hover {
        fill: #00f5ff !important;
        fill-opacity: 1 !important;
        filter: url(#cyanGlow) !important;
      }

      .panel-frame { transition: stroke 0.3s, filter 0.3s; }
      .hud-panel:hover .panel-frame {
        stroke: #00f5ff !important;
        filter: drop-shadow(0 0 3px rgba(0, 245, 255, 0.2));
      }
      ]]>
    </style>
  </defs>

  <!-- Deep Obsidian background grid -->
  <rect x="0" y="0" width="850" height="180" rx="12" fill="url(#bgGrad)" stroke="#162031" stroke-width="1.5" />
  
  <!-- Grid overlay pattern -->
  <pattern id="dotPattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="0.7" fill="#131a28" />
  </pattern>
  <rect width="850" height="180" fill="url(#dotPattern)" rx="12" />

  <!-- Neon ambient glow effects behind panels -->
  <circle cx="200" cy="90" r="80" fill="#8a2be2" fill-opacity="0.05" filter="url(#cyanGlow)" />
  <circle cx="650" cy="90" r="70" fill="#39ff14" fill-opacity="0.04" filter="url(#greenGlow)" />

  <!-- Main Observability Layout HUD -->
  <g class="hud-panel">
    <rect x="15" y="15" width="820" height="150" rx="10" fill="url(#panelGrad)" stroke="#1a253a" stroke-width="1.25" class="panel-frame" />
    
    <!-- Decorative Corner Lines -->
    <path d="M 16,30 L 16,16 L 30,16" stroke="#00f5ff" stroke-width="1.5" fill="none" />
    <path d="M 834,30 L 834,16 L 820,16" stroke="#00f5ff" stroke-width="1.5" fill="none" />
    <path d="M 16,150 L 16,164 L 30,164" stroke="#00f5ff" stroke-width="1.5" fill="none" />
    <path d="M 834,150 L 834,164 L 820,164" stroke="#00f5ff" stroke-width="1.5" fill="none" />

    <!-- 1. Left Section: Circular Uptime Gauge -->
    <g class="uptime-group" transform="translate(15, 0)">
      <circle cx="100" cy="90" r="32" fill="none" stroke="#141c2c" stroke-width="4.5" />
      <circle cx="100" cy="90" r="32" fill="none" stroke="#39ff14" stroke-width="4.5" 
              class="gauge-ring" stroke-linecap="round" filter="url(#greenGlow)" />
      <text cx="100" cy="90" x="100" y="94.5" font-family="'Outfit', sans-serif" font-weight="800" font-size="12" fill="#ffffff" text-anchor="middle" class="gauge-val">99.99</text>
      
      <text x="145" y="83" class="metric-label">UPTIME</text>
      <text x="145" y="102" font-family="'Outfit', sans-serif" font-weight="800" font-size="14" fill="#39ff14" filter="url(#greenGlow)">HEALTHY</text>
    </g>

    <!-- Section Divider -->
    <line x1="280" y1="30" x2="280" y2="150" stroke="#162031" stroke-width="1" />

    <!-- 2. Middle Section: Telemetry Oscilloscope -->
    <g transform="translate(300, 0)">
      <text x="0" y="38" class="panel-header-text">TELEMETRY WAVEFORM</text>
      <rect x="0" y="48" width="240" height="74" rx="6" fill="#06090e" stroke="#151e2c" stroke-width="0.75" />
      
      <!-- Oscilloscope subtle horizontal grid lines -->
      <line x1="0" y1="85" x2="240" y2="85" stroke="#101724" stroke-width="0.5" stroke-dasharray="2,2" />
      
      <path d="M 5,85 L 30,85 L 50,85 L 58,58 L 66,112 L 74,85 L 95,85 L 110,85 L 118,62 L 126,108 L 134,85 L 155,85 L 175,85 L 183,58 L 191,112 L 199,85 L 220,85" 
            fill="none" stroke="url(#neonGlow)" stroke-width="1.75" class="heartbeat-line" />
      
      <text x="5" y="136" font-family="'Fira Code', monospace" font-size="8.5" fill="#5c667c">SYS_LOAD: PASSIVE</text>
      <text x="235" y="136" font-family="'Fira Code', monospace" font-size="8.5" fill="#39ff14" text-anchor="end" filter="url(#greenGlow)">ACTIVE_TELEM</text>
    </g>

    <!-- Section Divider -->
    <line x1="565" y1="30" x2="565" y2="150" stroke="#162031" stroke-width="1" />

    <!-- 3. Right Section: Server Grid & Infrastructure Scale -->
    <g transform="translate(585, 0)">
      <text x="0" y="38" class="panel-header-text">PRODUCTION INFRASTRUCTURE</text>
      
      <!-- Grid representing 20 SRE Nodes (all healthy green) -->
      <g transform="translate(0, 48)">
        <!-- Row 1 -->
        <rect x="0" y="0" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="15" y="0" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="30" y="0" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="45" y="0" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="60" y="0" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />

        <!-- Row 2 -->
        <rect x="0" y="15" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="15" y="15" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="30" y="15" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="45" y="15" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="60" y="15" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />

        <!-- Row 3 -->
        <rect x="0" y="30" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="15" y="30" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="30" y="30" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="45" y="30" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="60" y="30" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />

        <!-- Row 4 -->
        <rect x="0" y="45" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="15" y="45" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="30" y="45" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
        <rect x="45" y="45" width="11" height="11" rx="2.5" class="server-node node-ok" fill="#39ff14" />
        <rect x="60" y="45" width="11" height="11" rx="2.5" class="server-node node-ok-slow" fill="#39ff14" />
      </g>

      <!-- Label details -->
      <g transform="translate(85, 52)">
        <text x="0" y="10" class="metric-label" font-size="9">INFRA SCALE</text>
        <text x="0" y="27" class="metric-value" font-size="14" fill="#ffffff" font-family="'Outfit', sans-serif">15,000+ SERVERS</text>
        <text x="0" y="41" class="metric-label" font-size="8.5" fill="#5c667c">PubMatic Prod Nodes</text>
      </g>

      <text x="0" y="136" font-family="'Fira Code', monospace" font-size="8.5" fill="#5c667c">SLA: 99% COMPLIANT</text>
    </g>

  </g>
</svg>
